<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | NUCLICKS</title>

    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/Student_PrePostQuiz.css">
    <link rel="stylesheet" href="css/Student_Quiz_Flashcard.css">
    <link rel="icon" href="assets/logos/NU_ICON_Blue.png">
</head>
<body>

<div class="layout-wrapper">

    <div class="dashboard-panel quiz-mode">
        <div class="page-content quiz-page">

            <!-- HEADER -->
            <div class="page-header quiz-header">
                <h1>Quizzes</h1>
                <button class="btn btn-secondary">Exit</button>
            </div>

            <!-- FLASHCARD AREA -->
            <div class="flashcard-stage">

                    <!-- BACK CARD -->
                    <div class="flashcard card-back" id="cardBack"></div>

                    <!-- FRONT CARD -->
                    <div class="flashcard card-front" id="cardFront">
                    <span class="question-count">
                    Question <span id="questionIndex">1</span>
            </span>

                <h2 class="question-text" id="questionText"></h2>

                <div class="options-list" id="optionsList"></div>
            </div>
        </div>

            <!-- NAVIGATION -->
            <div class="quiz-navigation">
                <button class="quiz-nav-btn back" onclick="prevQuestion()">← Back</button>
                <button class="quiz-nav-btn next" onclick="nextQuestion()">Next →</button>
            </div>

        </div>
    </div>
</div>

<script> 

const questions = [
    {
        text: "What does HTML stand for?",
        options: [
            "Hyper Text Markup Language",
            "High Tech Machine Language",
            "Home Tool Markup Language",
            "Hyperlinks and Text Markup Language"
        ]
    },
    {
        text: "CSS is used for styling websites.",
        options: ["True", "False"]
    }
];

let index = 0;

const front = document.getElementById("cardFront");
const back = document.getElementById("cardBack");
const qText = document.getElementById("questionText");
const qIndex = document.getElementById("questionIndex");
const optionsList = document.getElementById("optionsList");

/* RENDER CONTENT */
function renderQuestion(i) {
    qIndex.textContent = i + 1;
    qText.textContent = questions[i].text;

    optionsList.innerHTML = "";
    questions[i].options.forEach(opt => {
        optionsList.innerHTML += `
            <label class="option-item">
                <input type="radio" name="q${i}">
                ${opt}
            </label>
        `;
    });
}

/* SHUFFLE ANIMATION */
function nextQuestion() {
    if (index >= questions.length - 1) return;

    // Animate current card out
    front.classList.add("animate-out");

    setTimeout(() => {
        index++;

        // Update content
        renderQuestion(index);

        // Animate back card forward
        back.classList.add("animate-in");

        // Reset states
        setTimeout(() => {
            front.classList.remove("animate-out");
            back.classList.remove("animate-in");
        }, 200);

    }, 350);
}

function prevQuestion() {
    if (index <= 0) return;

    front.classList.add("animate-out");

    setTimeout(() => {
        index--;
        renderQuestion(index);
        front.classList.remove("animate-out");
    }, 350);
}

// Initial render
renderQuestion(index);


</script>
</body>
</html>
